# docker-compose.coolify.yml — Producción en Coolify (solo API)
#
# Asume que PostgreSQL y Redis YA EXISTEN en Coolify (o donde sea).
# Solo deployamos la API — la web se sirve como Static Site de Coolify
# (ver infra/coolify/README.md).
#
# Conectar a DBs externos:
#   - Coolify expone los servicios en su red interna. El hostname suele ser
#     el nombre del recurso (ej: `postgres`) o `<nombre>-<id>`.
#   - Configurar POSTGRES_HOST, REDIS_HOST apuntando al hostname correcto.
#
# Alternativa: si prefieres que la API traiga su propio Postgres en compose,
# ver docker-compose.full-stack.yml (incluye postgres + redis).

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: lavanderpro-api
    restart: unless-stopped
    # No agregamos depends_on aquí porque las DBs son externas a este compose.
    # Coolify esperará por los healthchecks externos via el proxy reverso.
    environment:
      NODE_ENV: production
      PORT: 4000
      # ── PostgreSQL (Coolify-managed o externo) ──
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # ── Redis (Coolify-managed o externo) ──
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # ── JWT ──
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-60d}
      # ── CORS (dominios del frontend) ──
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - coolify
      # Si tu DB de Coolify está en otra red, agrégala aquí:
      # - coolify-db

    # Healthcheck
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ── Networks ──
# `coolify` es la red por defecto donde Coolify pone sus servicios.
# Si tus DBs están en otra red con nombre distinto, ajústalo.
networks:
  coolify:
    name: coolify
    external: true