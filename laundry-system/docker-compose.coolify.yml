# docker-compose.coolify.yml — Producción en Coolify (SOLO API)
#
# Este compose contiene SOLO la API. El frontend se deploya como Static Site
# separado (ver infra/coolify/README.md sección "Split deployment").
#
# Razón del split: cuando Coolify gestiona un Docker Compose con varios
# servicios, inyecta labels `caddy_0.*` con `try_files` automático que
# asume que los archivos están en el filesystem de Caddy. Esto rompe
# el routing para containers nginx que sirven SPA routes (como Next.js
# static export). Separar el web en Static Site evita este problema.
#
# Setup en Coolify:
#   1. New Resource → Docker Compose
#   2. Source: tu repo + branch `main`
#   3. Docker Compose Location: docker-compose.coolify.yml
#   4. Environment Variables: ver .env.production.example
#   5. Dominio: api.tu-dominio.com → este compose (la API)
#
# El frontend se deploya como segundo recurso:
#   1. New Resource → Static Site
#   2. Source: tu repo + branch `main`
#   3. Build Pack: Dockerfile
#   4. Docker File Location: apps/web/Dockerfile (target: static)
#   5. Publish Directory: /public
#   6. Dominio: lavander.tu-dominio.com → Static Site

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: lavanderpro-api
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      # ── PostgreSQL (Coolify-managed o externo) ──
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # ── Redis (Coolify-managed o externo) ──
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # ── JWT ──
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-60d}
      # ── CORS ──
      # Lista separada por comas de dominios del frontend autorizados.
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - coolify
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  coolify:
    name: ${COOLIFY_NETWORK:-coolify}
    external: true