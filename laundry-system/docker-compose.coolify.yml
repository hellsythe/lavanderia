# docker-compose.coolify.yml — Producción en Coolify
#
# Stack completo: PostgreSQL + Redis + API + Web.
# Las DBs son externas (Coolify-managed o donde sea); el resto se builda
# con Dockerfiles propios (sin Nixpacks, que no soporta bien pnpm monorepos).
#
# Setup en Coolify:
#   1. New Resource → Docker Compose
#   2. Source: tu repo + rama
#   3. Docker Compose Location: docker-compose.coolify.yml
#   4. Environment Variables: ver .env.production.example
#   5. Dominios: api.tu-dominio.com → api, lavander.tu-dominio.com → web

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: lavanderpro-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      # ── PostgreSQL (Coolify-managed o externo) ──
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # ── Redis (Coolify-managed o externo) ──
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # ── JWT ──
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-60d}
      # ── CORS (dominios del frontend) ──
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - coolify
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: lavanderpro-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - coolify
    # nginx sirve en 80 — Coolify expone el dominio configurado

networks:
  coolify:
    name: coolify
    external: true