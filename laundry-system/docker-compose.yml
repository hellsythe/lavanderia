# Docker Compose — LavanderPro (desarrollo local)
#
# Levanta TODO el stack para dev local:
#   postgres, redis, adminer → datos (con persistencia en volúmenes)
#   api                       → NestJS con hot-reload
#   web                       → Next.js dev server con HMR
#
# Para producción en Coolify, usar `docker-compose.coolify.yml`
# (que NO incluye DBs — Coolify las provee).

services:
  # ────────────────────────────────────────────────────────
  # Data services (persistentes)
  # ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lavanderpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lavanderpro}
      POSTGRES_USER: ${POSTGRES_USER:-lavanderpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lavanderpro}
    ports:
      # 5433 (no 5432) para evitar conflicto con otros proyectos
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - lavanderpro_pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lavanderpro} -d ${POSTGRES_DB:-lavanderpro}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lavanderpro-redis
    restart: unless-stopped
    ports:
      # 6380 (no 6379) para evitar conflicto
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - lavanderpro_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: lavanderpro-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

  # Object Storage — MinIO (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: lavanderpro-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - lavanderpro_miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # Init MinIO bucket (one-shot)
  minio-init:
    image: minio/mc:latest
    container_name: lavanderpro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb -p local/lavanderpro-assets --ignore-existing;
      mc anonymous set public local/lavanderpro-assets;
      echo 'MinIO init done — bucket lavanderpro-assets created'
      "

  # ────────────────────────────────────────────────────────
  # API (NestJS con hot-reload)
