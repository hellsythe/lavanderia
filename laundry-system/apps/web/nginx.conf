# nginx.conf — LavanderPro frontend estático
#
# - Sirve los archivos estáticos exportados de Next.js
# - Soporta client-side routing (todas las rutas → index.html)
# - Cache agresivo para assets con hash en el nombre
# - Seguridad básica (X-Frame-Options, etc.)

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Archivos estáticos con hash en el nombre (Next.js _next/static/*) ──
    # Cache inmutable por 1 año
    location /_next/static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Assets estáticos propios (favicon, manifest, etc.) ──
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|woff|woff2)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Service Worker de la PWA — debe ir sin cache para actualizaciones ──
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # ── Páginas Next.js (.html exportadas) — cache corto ──
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # ── Client-side routing: TODA ruta desconocida → index.html ──
    # Es seguro porque Next.js export genera HTML estático por ruta, y
    # si la ruta no existe en el export, va a index.html (no rompe nada).
    #
    # `$uri.html` en el try_files permite que nginx resuelva `/login`
    # → `out/login.html` (que sí existe) en vez de hacer fallback
    # ciegamente a `index.html`. Sin esto, /login servía el HTML del
    # dashboard.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── No exponer archivos ocultos ──
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── 404 custom — servir el index para que la SPA maneje ──
    error_page 404 /index.html;
}